services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: botmaker_db
      POSTGRES_USER: botmaker
      POSTGRES_PASSWORD: botmaker_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botmaker -d botmaker_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: /app/start.sh

volumes:
  postgres_data:
